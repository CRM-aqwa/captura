<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura 2026</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #333; }
        .container { text-align: center; padding: 20px; width: 90%; max-width: 400px; }
        #mic-btn { background: white; border: none; border-radius: 50%; width: 80px; height: 80px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; font-size: 30px; }
        #mic-btn.listening { background: #ff4b2b; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(255, 75, 43, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); } }
        #output { margin-top: 30px; font-style: italic; color: #666; min-height: 100px; line-height: 1.5; text-align: left; background: white; padding: 15px; border-radius: 10px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); width: 100%; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: monospace; font-size: 12px; color: #007aff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Captura 2026</h1>
    <button id="mic-btn">🎙️</button>
    <div id="output">Appuyez pour dicter...</div>
</div>

<script>
    const btn = document.getElementById('mic-btn');
    const output = document.getElementById('output');
    
    // --- METTEZ VOTRE CLÉ ICI ---
    const GEMINI_API_KEY = "AIzaSyAsoWUB5rtN0fBPZqXQA4qa51PDFCj-uXs"; 
    // ----------------------------

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-CH';
        recognition.interimResults = false;

        btn.addEventListener('click', () => {
            if (btn.classList.contains('listening')) {
                recognition.stop();
                btn.classList.remove('listening');
            } else {
                recognition.start();
                btn.classList.add('listening');
                output.innerText = "Je vous écoute...";
            }
        });

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            output.innerHTML = `<em>"${transcript}"</em><br><br><strong>Analyse IA... 🧠</strong>`;
            btn.classList.remove('listening');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tu es l'assistant de tri de Captura. Analyse cette dictée et classe-la proprement. Dictée: "${transcript}"` }] }]
                    })
                });
                const data = await response.json();
                const aiResult = data.candidates[0].content.parts[0].text;
                output.innerHTML = `<strong>Dictée :</strong> ${transcript}<br><br><strong>Analyse :</strong><br><pre>${aiResult}</pre>`;
            } catch (error) {
                output.innerText = "Erreur Gemini : Vérifiez votre clé API.";
            }
        };
    } else {
        output.innerText = "Micro non supporté.";
    }
</script>
</body>
</html>
