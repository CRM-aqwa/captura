<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura 2026</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #333; }
        .container { text-align: center; padding: 20px; width: 90%; max-width: 400px; }
        #mic-btn { background: white; border: none; border-radius: 50%; width: 80px; height: 80px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); cursor: pointer; font-size: 30px; margin-bottom: 20px; }
        #mic-btn.listening { background: #ff4b2b; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(255, 75, 43, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 75, 43, 0); } }
        #output { font-style: italic; color: #666; min-height: 100px; text-align: left; background: white; padding: 15px; border-radius: 10px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.05); width: 100%; font-size: 14px; }
        .config { margin-bottom: 20px; font-size: 12px; }
        input { padding: 8px; border-radius: 5px; border: 1px solid #ccc; width: 80%; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: monospace; font-size: 11px; color: #007aff; }
    </style>
</head>
<body>

<div class="container">
    <h1>Captura Live</h1>
    
    <div class="config">
        <input type="password" id="api-key-input" placeholder="Collez votre clé API ici">
        <p style="font-size: 10px; color: #999;">La clé reste sur votre iPhone uniquement.</p>
    </div>

    <button id="mic-btn">🎙️</button>
    <div id="output">Entrez votre clé ci-dessus, puis parlez.</div>
</div>

<script>
    const btn = document.getElementById('mic-btn');
    const output = document.getElementById('output');
    const keyInput = document.getElementById('api-key-input');

    // Récupérer la clé si elle a déjà été saisie
    if(localStorage.getItem('gemini_key')) {
        keyInput.value = localStorage.getItem('gemini_key');
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-CH';

        btn.addEventListener('click', () => {
            const key = keyInput.value.trim();
            if(!key) { alert("Veuillez coller votre clé d'abord !"); return; }
            
            // Sauvegarder la clé localement sur le téléphone
            localStorage.setItem('gemini_key', key);

            if (btn.classList.contains('listening')) {
                recognition.stop();
                btn.classList.remove('listening');
            } else {
                recognition.start();
                btn.classList.add('listening');
                output.innerText = "Je vous écoute...";
            }
        });

        recognition.onresult = async (event) => {
            const transcript = event.results[0][0].transcript;
            const key = keyInput.value.trim();
            output.innerHTML = `<em>"${transcript}"</em><br><br><strong>Analyse IA en cours... 🧠</strong>`;
            btn.classList.remove('listening');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=${key}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Classe cette dictée (Action, Domaine, Type: IDEE ou TACHE). Dictée: "${transcript}"` }] }]
                    })
                });
                const data = await response.json();
                if(data.error) throw new Error(data.error.message);
                
                const aiResult = data.candidates[0].content.parts[0].text;
                output.innerHTML = `<strong>Dictée :</strong> ${transcript}<br><br><strong>Analyse :</strong><br><pre>${aiResult}</pre>`;
            } catch (error) {
                output.innerHTML = `<span style="color:red">Erreur : ${error.message}</span>`;
            }
        };
    }
</script>
</body>
</html>
