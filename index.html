<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Captura Live</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; min-height: 100vh; margin: 0; color: #1c1e21; padding-top: 5vh; }
        .container { text-align: center; padding: 25px; width: 90%; max-width: 400px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 20px; color: #1a73e8; }
        #mic-btn { background: #f8f9fa; border: 1px solid #dadce0; border-radius: 50%; width: 90px; height: 90px; cursor: pointer; font-size: 35px; margin: 0 auto 20px auto; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; -webkit-tap-highlight-color: transparent; }
        #mic-btn.listening { background: #ea4335; color: white; border-color: #ea4335; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0.4); } 70% { box-shadow: 0 0 0 20px rgba(234, 67, 53, 0); } 100% { box-shadow: 0 0 0 0 rgba(234, 67, 53, 0); } }
        #output { font-size: 15px; line-height: 1.6; color: #444; background: #f8f9fa; padding: 15px; border-radius: 12px; border: 1px solid #e8eaed; min-height: 60px; text-align: left; width: 100%; box-sizing: border-box; }
        .config { margin-bottom: 20px; }
        input { padding: 12px; border-radius: 8px; border: 1px solid #ced4da; width: 100%; box-sizing: border-box; font-size: 14px; text-align: center; margin-bottom: 5px; }
        .hint { font-size: 11px; color: #70757a; }
        pre { white-space: pre-wrap; word-wrap: break-word; font-family: inherit; font-size: 14px; color: #007aff; font-weight: 600; margin: 0; }
        #log-panel { width: 90%; max-width: 400px; background: #222; color: #0f0; font-family: monospace; font-size: 11px; padding: 10px; border-radius: 10px; height: 120px; overflow-y: auto; }
    </style>
</head>
<body>

<div class="container">
    <h1>Captura Live</h1>
    <div class="config">
        <input type="password" id="api-key-input" placeholder="Clé API Gemini">
        <div class="hint">Stockée sur votre iPhone (localStorage).</div>
    </div>
    <button id="mic-btn">🎙️</button>
    <div id="output">Appuyez pour parler...</div>
</div>

<div id="log-panel">
    <div style="color:#fabb05; margin-bottom:5px;">-- LOGS DE DIAGNOSTIC --</div>
    <div id="log-content">Prêt.</div>
</div>

<script>
    const btn = document.getElementById('mic-btn');
    const output = document.getElementById('output');
    const keyInput = document.getElementById('api-key-input');
    const logContent = document.getElementById('log-content');

    function log(msg, color = "#fff") {
        const time = new Date().toLocaleTimeString('fr-CH');
        logContent.innerHTML += `<div style="color:${color}">[${time}] ${msg}</div>`;
        logContent.parentElement.scrollTop = logContent.parentElement.scrollHeight;
    }

    const savedKey = localStorage.getItem('gemini_key');
    if (savedKey) { keyInput.value = savedKey; log("Clé chargée.", "#34a853"); }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        output.innerHTML = "Safari requis.";
    } else {
        const rec = new SpeechRecognition();
        rec.lang = 'fr-CH';
        rec.interimResults = true;

        btn.addEventListener('click', function() {
            if (btn.classList.contains('listening')) {
                rec.stop();
                btn.classList.remove('listening');
            } else {
                const key = keyInput.value.trim();
                if (!key) { alert("Entrez la clé !"); return; }
                localStorage.setItem('gemini_key', key);
                try {
                    rec.start();
                    btn.classList.add('listening');
                    output.innerHTML = "Écoute...";
                    log("Micro ON", "#fabb05");
                } catch(e) { log("Erreur: " + e.message, "#ea4335"); }
            }
        });

        rec.onresult = function(event) {
            let text = "";
            for (let i = 0; i < event.results.length; i++) {
                text += event.results[i][0].transcript;
            }
            output.innerHTML = `<strong>Dictée:</strong> ${text}`;
            
            if (event.results[event.results.length - 1].isFinal) {
                log("Finalisé.", "#34a853");
                btn.classList.remove('listening');
                sendToGemini(text);
            }
        };

        async function sendToGemini(text) {
            const key = keyInput.value.trim();
            output.innerHTML = "<strong>Analyse...</strong>";
            try {
                // URL CORRIGÉE avec le modèle exact
                const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=" + key;
                
                const res = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Agis comme un assistant d'organisation. Analyse cette dictée et donne l'ACTION, le DOMAINE et le TYPE (IDEE ou TACHE). Dictée: " + text }] }]
                    })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error.message);
                
                const result = data.candidates[0].content.parts[0].text;
                output.innerHTML = `<strong>Dictée:</strong> ${text}<br><hr><pre>${result}</pre>`;
                log("Réponse reçue !", "#34a853");
            } catch(e) {
                log("Erreur: " + e.message, "#ea4335");
                output.innerHTML = "Erreur: " + e.message;
            }
        }

        rec.onerror = (e) => { btn.classList.remove('listening'); log("Erreur: " + e.error, "#ea4335"); };
        rec.onend = () => { btn.classList.remove('listening'); log("Micro OFF", "#fabb05"); };
    }
</script>
</body>
</html>
