<script>
    const btn = document.getElementById('mic-btn');
    const output = document.getElementById('output');
    const keyInput = document.getElementById('api-key-input');
    const logList = document.getElementById('log-entry');

    function logToPanel(message, type = '') {
        const li = document.createElement('li');
        const now = new Date().toLocaleTimeString('fr-CH');
        li.textContent = `[${now}] ${message}`;
        if (type) li.className = type;
        logList.appendChild(li);
        logList.scrollTop = logList.scrollHeight;
    }

    if(localStorage.getItem('gemini_key')) {
        keyInput.value = localStorage.getItem('gemini_key');
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    
    if (SpeechRecognition) {
        const recognition = new SpeechRecognition();
        recognition.lang = 'fr-CH'; 
        recognition.interimResults = true; // On veut voir le texte en direct
        recognition.continuous = false;

        btn.addEventListener('click', () => {
            const key = keyInput.value.trim();
            if(!key) { alert("Clé manquante !"); return; }
            localStorage.setItem('gemini_key', key);

            if (btn.classList.contains('listening')) {
                logToPanel("Arrêt demandé...");
                btn.classList.remove('listening'); // On arrête le pulse immédiatement
                recognition.stop(); 
            } else {
                try {
                    recognition.start();
                    btn.classList.add('listening');
                    output.innerHTML = "<em>Je vous écoute...</em>";
                } catch (e) { logToPanel("Erreur start: " + e.message, "error"); }
            }
        });

        recognition.onstart = () => logToPanel("Micro ouvert (Parlez maintenant)", "event");

        recognition.onresult = async (event) => {
            // On récupère le texte, même intermédiaire
            const transcript = Array.from(event.results)
                .map(result => result[0].transcript)
                .join('');
            
            output.innerHTML = `<strong>En cours :</strong> ${transcript}`;

            // Si c'est le résultat final
            if (event.results[0].isFinal) {
                logToPanel("Texte final reçu.", "success");
                btn.classList.remove('listening');
                processWithGemini(transcript);
            }
        };

        async function processWithGemini(transcript) {
            const key = keyInput.value.trim();
            output.innerHTML = `<strong>Dictée :</strong> ${transcript}<br><em>Analyse Gemini...</em>`;
            
            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`;
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Tu es Captura. Analyse et classe : "${transcript}"` }] }]
                    })
                });
                const data = await response.json();
                const aiResult = data.candidates[0].content.parts[0].text;
                output.innerHTML = `<strong>Dictée :</strong> ${transcript}<br><hr><pre>${aiResult}</pre>`;
            } catch (error) {
                logToPanel("Erreur Gemini: " + error.message, "error");
            }
        }

        recognition.onerror = (event) => {
            btn.classList.remove('listening');
            logToPanel("Erreur Safari: " + event.error, "error");
        };

        recognition.onend = () => {
            logToPanel("Reconnaissance terminée.", "event");
            btn.classList.remove('listening');
        };

    } else {
        output.innerHTML = "Safari/iOS requis.";
    }
</script>
