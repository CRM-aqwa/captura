<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Captura Stable v18</title>
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; --green: #32d74b; --red: #ff453a; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center; box-sizing: border-box; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 14px; outline: none; }
        #mic-btn { width: 85px; height: 85px; border-radius: 50%; border: none; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 32px; cursor: pointer; margin-bottom: 20px; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        #mic-btn.active { background: var(--red); color: #fff; transform: scale(1.1); box-shadow: 0 0 20px rgba(255, 59, 48, 0.4); }
        #display-zone { text-align: left; background: #f9f9f9; padding: 18px; border-radius: 16px; border: 1px solid #e5e5ea; min-height: 120px; font-size: 16px; width: 100%; box-sizing: border-box; }
        #ai-output { margin-top: 15px; padding-top: 15px; border-top: 2px solid var(--blue); color: #1c1c1e; line-height: 1.5; white-space: pre-wrap; display: none; }
        #debug-console { margin-top: 20px; padding: 12px; background: #1c1c1e; color: var(--green); border-radius: 12px; font-family: 'SF Mono', monospace; font-size: 11px; text-align: left; max-height: 140px; overflow-y: auto; width: 100%; box-sizing: border-box; border: 1px solid #3a3a3c; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top:0; color:#1c1c1e;">Captura Live</h2>
    <p style="font-size: 12px; color: #8e8e93; margin-bottom: 15px;">Assistant de dictée intelligent</p>
    
    <input type="password" id="apiKey" placeholder="Coller la clé API Gemini ici">
    
    <button id="mic-btn">🎙️</button>
    
    <div id="display-zone">
        <div id="live-text" style="color: #8e8e93;">Prêt pour la dictée...</div>
        <div id="ai-output"></div>
    </div>

    <div id="debug-console">> Système prêt (v18).</div>
</div>

<script>
    const btn = document.getElementById('mic-btn');
    const debug = document.getElementById('debug-console');
    const liveText = document.getElementById('live-text');
    const aiOutput = document.getElementById('ai-output');
    const apiInput = document.getElementById('apiKey');

    // Récupération de la clé sauvegardée
    apiInput.value = localStorage.getItem('gemini_key') || '';
