<!DOCTYPE html>
<html lang="fr-CH">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Captura Live v9</title>
    <style>
        :root { --blue: #007aff; --bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: #fff; width: 100%; max-width: 400px; padding: 25px; border-radius: 24px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); text-align: center; box-sizing: border-box; }
        h1 { font-size: 24px; margin-bottom: 20px; color: var(--blue); font-weight: 700; }
        input { width: 100%; padding: 14px; border: 1px solid #d1d1d6; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: 16px; background: #f9f9f9; }
        #mic-btn { width: 90px; height: 90px; border-radius: 45px; border: none; background: #fff; box-shadow: 0 4px 15px rgba(0,0,0,0.1); font-size: 35px; cursor: pointer; margin-bottom: 20px; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
        #mic-btn.active { background: #ff3b30; color: #fff; transform: scale(1.05); }
        #output-container { text-align: left; background: #f9f9f9; padding: 18px; border-radius: 16px; min-height: 120px; font-size: 16px; border: 1px solid #e5e5ea; width: 100%; box-sizing: border-box; line-height: 1.5; }
        #ai-result { color: var(--blue); font-weight: 700; margin-top: 15px; padding-top: 15px; border-top: 1px solid #e5e5ea; white-space: pre-wrap; display: none; }
        .status { font-size: 13px; color: #8e8e93; margin-top: 15px; font-weight: 500; }
    </style>
</head>
<body>

<div class="card">
    <h1>Captura Live</h1>
    <input type="password" id="apiKey" placeholder="Clé API Gemini" autocomplete="off">
    <button id="mic-btn">🎙️</button>
    <div id="output-container">
        <span id="transcript-text">Appuyez pour commencer...</span>
        <div id="ai-result"></div>
    </div>
    <div class="status" id="statusText">Prêt</div>
</div>

<script>
    const btn = document.getElementById('mic-btn');
    const transcriptDisplay = document.getElementById('transcript-text');
    const aiResultDisplay = document.getElementById('ai-result');
    const statusText = document.getElementById('statusText');
    const apiKeyInput = document.getElementById('apiKey');

    apiKeyInput.value = localStorage.getItem('gemini_key') || '';

    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let rec = null;
    let fullText = "";

    if (!Recognition) {
        transcriptDisplay.innerHTML = "<b style='color:red'>Safari requis.</b>";
    } else {
        rec = new Recognition();
        rec.lang = 'fr-CH';
        rec.interimResults = true;
        rec.continuous = true;

        btn.onclick = () => {
            if (btn.classList.contains('active')) {
                rec.stop();
            } else {
                const key = apiKeyInput.value.trim();
                if (!key) return alert("Entrez votre clé API");
                localStorage.setItem('gemini_key', key);
                
                fullText = "";
                aiResultDisplay.style.display = "none";
                transcriptDisplay.innerText = "Écoute...";
                btn.classList.add('active');
                statusText.innerText = "Écoute en cours...";
                rec.start();
            }
        };

        rec.onresult = (event) => {
            let current = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                current += event.results[i][0].transcript;
            }
            fullText = current;
            transcriptDisplay.innerHTML = `<strong>Dictée :</strong> ${fullText}`;
        };

        rec.onend = () => {
            btn.classList.remove('active');
            if (fullText.length > 5) {
                analyze(fullText);
            } else {
                statusText.innerText = "Texte trop court.";
            }
        };

        async function analyze(text) {
            statusText.innerText = "Analyse Gemini...";
            const key = apiKeyInput.value.trim();
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${key}`;

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: "Analyse cette dictée courte et retourne uniquement : TYPE (Action/Idée), RÉSUMÉ (phrase propre), ACTION (verbe). Texte : " + text }] }]
                    })
                });

                const data = await response.json();
                if (data.error) throw new Error(data.error.message);

                const aiResponse = data.candidates[0].content.parts[0].text;
                aiResultDisplay.innerText = aiResponse;
                aiResultDisplay.style.display = "block";
                statusText.innerText = "Terminé ✅";
            } catch (err) {
                statusText.innerText = "Erreur API";
                aiResultDisplay.innerText = "Erreur : " + err.message;
                aiResultDisplay.style.display = "block";
            }
        }
    }
</script>
</body>
</html>
